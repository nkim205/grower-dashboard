name: dashboard

on:
  push:
    branches:
      - dev
      - main
      - allison-dev
  schedule:
    - cron: "0 0 * * *"
    - cron: "0 12 * * *"
  workflow_dispatch:

permissions:
  contents: write

env:
  PYTHON_VERSION: "3.11"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  dashboard-refresh:
    name: Update dashboard data
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        branch: ${{ github.event_name == 'schedule' && fromJSON('["main"]') || fromJSON(format('["0"]', github.ref_name)) }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4.2.2
        with:
          ref: ${{ matrix.branch }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5.4.0
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install boto3 pandas python-dotenv

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4.1.0
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Run dashboard data retrieval
        run: |
          python retrieveS3ForDash.py

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/states/
          git diff --staged --quiet || git commit -m "chore: update daily dashboard files"
          git push origin HEAD:${{ matrix.branch }}
